<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>
        @paulomelojunior
    </title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="main.css">
</head>

<body class="preload">
    <script>

        function pageLoad() {
            document.querySelector('body').classList.remove('preload');
            setTimeout(() => {
                document.querySelector('.pagePicture').classList.add('done');
                document.querySelector('.pageContent').classList.add('done');
                document.querySelector('#loader').classList.add('done');
            }, 500);
        }

        
        if (window.innerWidth < 768) {
            pageLoad()
        } else {
            window.addEventListener('load', pageLoad);
        }

    </script>
    <div id="loader">
        <img height="32" src="assets/images/dark.svg" alt="Loading...">
    </div>
    <div class="pageWrapper">
        <img class="pagePicture" src="assets/images/bg.jpg" alt="Picture of Paulo Melo">
        <nav class="pageMenu">
            <ul class="list">
                <li>
                    <a target="_blank" href="https://github.com/paulomelojunior">
                        github
                    </a>
                </li>
                <li>
                    <a target="_blank" href="https://instagram.com/paulomelojunior">
                        instagram
                    </a>
                </li>
                <li>
                    <a target="_blank" href="https://www.linkedin.com/in/paulomelojunior/">
                        linkedin
                    </a>
                </li>
            </ul>
        </nav>
        <main class="pageContent">
            <img class="logo" src="assets/images/light.svg" alt="Tech Niceness">
            <h1 class="pageTitle">
                paulo melo<br />
                <small>
                    designer and coder
                </small>
            </h1>
            <button class="toggleMenu">
                <span>
                    menu
                </span>
            </button>
        </main>
        <footer class="pageFooter">
            <span class="pageSubtitle">
                Soon or never.
            </span>
            <ul class="list">
                <li>
                    <a target="_blank" href="https://github.com/techniceness">
                        &copy; 2019 techniceness.com
                    </a>
                </li>
            </ul>
        </footer>
    </div>
</body>
<script>

    const button = document.querySelector('.toggleMenu');
    const menu = document.querySelector('.pageMenu');
    const content = document.querySelector('.pageContent');
    const footer = document.querySelector('.pageFooter');

    function toggleMenu() {
        menu.classList.toggle('open');
        footer.classList.toggle('open');
        button.classList.toggle('x');
    }

    button.addEventListener('click', function (e) {
        toggleMenu();
        e.stopPropagation();
    })

    content.addEventListener('click', function () {
        if (menu.classList.contains('open')) {
            toggleMenu()
        }
    })

</script>

</html>
